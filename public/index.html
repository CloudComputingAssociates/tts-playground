<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f4;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #d8d4cc;
    --accent: #c83e3e;
    --accent-soft: #f4e8e6;
    --code-bg: #f0ece4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    padding: 2rem;
    min-height: 100vh;
  }
  .container {
    max-width: 880px;
    margin: 0 auto;
  }
  header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--line);
  }
  h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .subtitle {
    color: var(--muted);
    margin-top: 0.25rem;
    font-style: italic;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.4rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  select, input[type="number"] {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border: 1px solid var(--line);
    background: white;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    border-radius: 2px;
    color: var(--ink);
  }
  select:focus, input[type="number"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
  }
  .toggle-row input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    cursor: pointer;
    accent-color: var(--accent);
  }
  textarea {
    width: 100%;
    min-height: 220px;
    padding: 1rem;
    border: 1px solid var(--line);
    background: white;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.92rem;
    line-height: 1.6;
    border-radius: 2px;
    color: var(--ink);
    resize: vertical;
  }
  .actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
    align-items: center;
  }
  button {
    padding: 0.75rem 1.5rem;
    background: var(--ink);
    color: var(--bg);
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, transform 0.05s;
  }
  button:hover:not(:disabled) { background: var(--accent); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  button.secondary:hover:not(:disabled) {
    background: var(--ink);
    color: var(--bg);
  }
  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .status.error { color: var(--accent); }
  .player-section {
    margin-top: 2rem;
    padding: 1.5rem;
    background: var(--accent-soft);
    border-radius: 2px;
    display: none;
  }
  .player-section.visible { display: block; }
  audio {
    width: 100%;
    margin-bottom: 0.75rem;
  }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .examples {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--line);
  }
  .examples h2 {
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }
  .example-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .example-btn {
    text-align: left;
    background: var(--code-bg);
    color: var(--ink);
    padding: 0.6rem 0.85rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid transparent;
    line-height: 1.4;
  }
  .example-btn:hover {
    border-color: var(--accent);
    background: white;
  }
  .example-btn strong {
    color: var(--accent);
    margin-right: 0.5rem;
  }
  @media (max-width: 640px) {
    body { padding: 1rem; }
    .controls { grid-template-columns: 1fr; }
    h1 { font-size: 1.6rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>TTS Playground</h1>
    <div class="subtitle">Google Cloud Chirp 3: HD voices · MP3 output</div>
  </header>

  <div class="controls">
    <div>
      <label for="voice">Voice</label>
      <select id="voice">
        <optgroup label="Chirp 3: HD (en-US)">
          <option value="en-US-Chirp3-HD-Leda">Leda (warm, female)</option>
          <option value="en-US-Chirp3-HD-Kore">Kore (clear, female)</option>
          <option value="en-US-Chirp3-HD-Aoede">Aoede (bright, female)</option>
          <option value="en-US-Chirp3-HD-Charon">Charon (deep, male)</option>
          <option value="en-US-Chirp3-HD-Fenrir">Fenrir (energetic, male)</option>
          <option value="en-US-Chirp3-HD-Puck">Puck (playful, male)</option>
        </optgroup>
        <optgroup label="Neural2 (cheaper, no Chirp)">
          <option value="en-US-Neural2-F">Neural2 F (female)</option>
          <option value="en-US-Neural2-J">Neural2 J (male)</option>
        </optgroup>
      </select>
    </div>
    <div>
      <label for="lang">Language</label>
      <select id="lang">
        <option value="en-US">en-US</option>
        <option value="en-GB">en-GB</option>
      </select>
    </div>
    <div>
      <label for="rate">Speaking Rate</label>
      <input type="number" id="rate" min="0.25" max="2.0" step="0.05" value="1.0">
    </div>
  </div>

  <div class="toggle-row">
    <input type="checkbox" id="useSSML">
    <label for="useSSML" style="margin: 0; text-transform: none; letter-spacing: 0; color: var(--ink);">
      Treat input as SSML (must be wrapped in &lt;speak&gt;...&lt;/speak&gt;)
    </label>
  </div>

  <div>
    <label for="text">Text / SSML</label>
    <textarea id="text" placeholder="Type something to synthesize, or pick an example below.">Hello! This is a test of Google Cloud Text-to-Speech.</textarea>
  </div>

  <div class="actions">
    <button id="synthesize">Synthesize</button>
    <button id="download" class="secondary" disabled>Download MP3</button>
    <span class="status" id="status"></span>
  </div>

  <div class="player-section" id="playerSection">
    <audio id="player" controls></audio>
    <div class="meta">
      <span id="meta-size"></span>
      <span id="meta-voice"></span>
    </div>
  </div>

  <div class="examples">
    <h2>SSML Examples — click to load</h2>
    <div class="example-list">
      <button class="example-btn" data-ssml="true" data-text="<speak>Plain text first. <break time='800ms'/> Now after a pause. <break time='1500ms'/> And a longer pause.</speak>">
        <strong>break</strong>Insert pauses of any length
      </button>
      <button class="example-btn" data-ssml="true" data-text="<speak>This is normal. But this word is <emphasis level='strong'>important</emphasis>. And this is <emphasis level='reduced'>less important</emphasis>.</speak>">
        <strong>emphasis</strong>Stress or de-stress words
      </button>
      <button class="example-btn" data-ssml="true" data-text="<speak>The acronym <say-as interpret-as='characters'>SSML</say-as> is spelled out, but <say-as interpret-as='characters'>NASA</say-as> is also spelled. Meanwhile, the time is <say-as interpret-as='time' format='hms12'>3:30pm</say-as>.</speak>">
        <strong>say-as</strong>Spell, read times, dates, numbers
      </button>
      <button class="example-btn" data-ssml="true" data-text="<speak>Visit our website at <sub alias='double you double you double you dot example dot com'>www.example.com</sub> for more info.</speak>">
        <strong>sub</strong>Substitute pronunciation for tricky text
      </button>
      <button class="example-btn" data-ssml="true" data-text="<speak>Some say <phoneme alphabet='ipa' ph='təˈmeɪtoʊ'>tomato</phoneme>, others say <phoneme alphabet='ipa' ph='təˈmɑːtoʊ'>tomato</phoneme>.</speak>">
        <strong>phoneme</strong>Force exact pronunciation with IPA
      </button>
      <button class="example-btn" data-ssml="true" data-text="<speak>Welcome back. <break time='400ms'/> You have <emphasis level='moderate'>three</emphasis> new messages, the latest from <sub alias='Doctor'>Dr.</sub> Smith at <say-as interpret-as='time' format='hms12'>2:15pm</say-as>. <break time='300ms'/> Would you like me to read them?</speak>">
        <strong>combo</strong>Realistic assistant utterance
      </button>
    </div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const synthesizeBtn = $('synthesize');
  const downloadBtn = $('download');
  const statusEl = $('status');
  const playerSection = $('playerSection');
  const player = $('player');
  const textEl = $('text');
  const ssmlToggle = $('useSSML');
  let lastBlobUrl = null;
  let lastFilename = 'tts.mp3';

  // Example buttons load both the text AND set the SSML toggle correctly
  document.querySelectorAll('.example-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      textEl.value = btn.dataset.text;
      ssmlToggle.checked = btn.dataset.ssml === 'true';
    });
  });

  synthesizeBtn.addEventListener('click', async () => {
    const text = textEl.value.trim();
    if (!text) {
      statusEl.textContent = 'Enter some text first.';
      statusEl.classList.add('error');
      return;
    }

    synthesizeBtn.disabled = true;
    downloadBtn.disabled = true;
    statusEl.classList.remove('error');
    statusEl.textContent = 'Synthesizing...';

    try {
      const res = await fetch('/synthesize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          text,
          voice: $('voice').value,
          languageCode: $('lang').value,
          speakingRate: parseFloat($('rate').value),
          useSSML: ssmlToggle.checked,
        }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Synthesis failed');

      // Convert base64 -> Blob -> object URL for the <audio> element.
      // Could use a data: URL directly but blob URLs are friendlier for download.
      const binary = atob(data.audioBase64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: data.mimeType });

      if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
      lastBlobUrl = URL.createObjectURL(blob);

      player.src = lastBlobUrl;
      playerSection.classList.add('visible');
      player.play().catch(() => {/* user can hit play manually if autoplay blocked */});

      const kb = (data.sizeBytes / 1024).toFixed(1);
      $('meta-size').textContent = `${kb} KB · MP3`;
      $('meta-voice').textContent = $('voice').value;

      const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
      lastFilename = `tts-${stamp}.mp3`;

      statusEl.textContent = 'Done.';
      downloadBtn.disabled = false;
    } catch (err) {
      statusEl.textContent = `Error: ${err.message}`;
      statusEl.classList.add('error');
    } finally {
      synthesizeBtn.disabled = false;
    }
  });

  downloadBtn.addEventListener('click', () => {
    if (!lastBlobUrl) return;
    const a = document.createElement('a');
    a.href = lastBlobUrl;
    a.download = lastFilename;
    a.click();
  });

  // Cmd/Ctrl+Enter to synthesize from the textarea
  textEl.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      synthesizeBtn.click();
    }
  });
</script>
</body>
</html>
